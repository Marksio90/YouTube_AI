version: "3.9"

# =============================================================================
# AI Media OS — Production-grade Docker Compose
# Use docker-compose.override.yml for local dev overrides.
# =============================================================================

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-production}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  SECRET_KEY: ${SECRET_KEY}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-claude-sonnet-4-6}
  LLM_PROVIDER: ${LLM_PROVIDER:-openai}
  YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
  YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
  S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA}
  S3_BUCKET_EXPORTS: ${S3_BUCKET_EXPORTS}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  SENTRY_DSN: ${SENTRY_DSN:-}

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai_media_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_media_os}
      POSTGRES_USER: ${POSTGRES_USER:-media_os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-media_os} -d ${POSTGRES_DB:-ai_media_os}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - media_os_net

  redis:
    image: redis:7.4-alpine
    container_name: ai_media_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - media_os_net

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: production
    container_name: ai_media_backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - media_os_net

  # ── Worker (Celery) ──────────────────────────────────────────────────────────
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
      target: production
    container_name: ai_media_worker
    restart: unless-stopped
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=4 -Q default,high,ai,media,analytics,pipeline
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - media_os_net

  worker_beat:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
      target: production
    container_name: ai_media_beat
    restart: unless-stopped
    command: celery -A worker.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    environment:
      <<: *backend-env
    depends_on:
      - redis
    networks:
      - media_os_net

  flower:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
      target: production
    container_name: ai_media_flower
    restart: unless-stopped
    command: celery -A worker.celery_app flower --port=5555 --url_prefix=flower
    environment:
      <<: *backend-env
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:-admin:change-me}
    depends_on:
      - redis
    ports:
      - "5555:5555"
    networks:
      - media_os_net

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: production
    container_name: ai_media_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - media_os_net

  # ── Reverse Proxy ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ai_media_nginx
    restart: unless-stopped
    volumes:
      - ./infra/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    networks:
      - media_os_net

volumes:
  postgres_data:
  redis_data:

networks:
  media_os_net:
    driver: bridge
