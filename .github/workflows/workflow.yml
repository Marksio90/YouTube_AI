name: CI/CD

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/ai-media-os
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockfile-integrity:
    name: Lockfile integrity
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Verify JS lockfile matches manifests
        run: |
          pnpm install --lockfile-only --ignore-scripts
          git diff --exit-code -- pnpm-lock.yaml

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Verify backend uv.lock matches pyproject.toml
        run: cd apps/backend && uv lock --check

      - name: Verify worker uv.lock matches pyproject.toml
        run: cd apps/worker && uv lock --check

  frontend-build:
    name: Build frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter frontend build

  backend-build:
    name: Build backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/backend[dev]"

      - name: Build backend (compile)
        run: python -m compileall apps/backend

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm --filter frontend lint

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/backend[dev]"

      - name: Lint backend (ruff)
        run: ruff check apps/backend

  tests:
    name: Tests (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lockfile-integrity, frontend-build, backend-build, lint]
    strategy:
      fail-fast: true
      matrix:
        suite: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: matrix.suite == 'frontend'
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        if: matrix.suite == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install frontend dependencies
        if: matrix.suite == 'frontend'
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        if: matrix.suite == 'frontend'
        run: pnpm --filter frontend test

      - name: Setup Python
        if: matrix.suite == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend test dependencies
        if: matrix.suite == 'backend'
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio fastapi sqlalchemy pydantic pydantic-settings PyJWT "passlib[bcrypt]" structlog asyncpg email-validator celery

      - name: Run backend tests
        if: matrix.suite == 'backend'
        env:
          SECRET_KEY: test-secret
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          PYTHONPATH: apps/backend
        run: pytest apps/backend/tests -q

  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [tests]
    if: github.event_name == 'push' && (github.ref_name == 'dev' || github.ref_name == 'main')

    strategy:
      fail-fast: false
      matrix:
        service: [frontend, backend, worker]

    outputs:
      deploy_env: ${{ steps.meta.outputs.deploy_env }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "deploy_env=prod" >> "$GITHUB_OUTPUT"
            echo "image_tag=prod-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_env=dev" >> "$GITHUB_OUTPUT"
            echo "image_tag=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ steps.meta.outputs.deploy_env }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [docker]
    if: github.event_name == 'push' && (github.ref_name == 'dev' || github.ref_name == 'main')
    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
      url: ${{ vars.ENVIRONMENT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          test -n "$KUBE_CONFIG_B64" || (echo "Missing KUBE_CONFIG_B64 secret" && exit 1)
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Select namespace
        id: ns
        run: |
          if [ -n "${{ vars.K8S_NAMESPACE }}" ]; then
            echo "value=${{ vars.K8S_NAMESPACE }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=ai-media-os" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply base manifests
        run: kubectl -n "${{ steps.ns.outputs.value }}" apply -k infra/k8s

      - name: Deploy release images
        env:
          IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}
        run: |
          NS="${{ steps.ns.outputs.value }}"
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}"
          kubectl -n "$NS" set image deployment/frontend frontend="$BASE/frontend:$IMAGE_TAG"
          kubectl -n "$NS" set image deployment/backend backend="$BASE/backend:$IMAGE_TAG"
          kubectl -n "$NS" set image deployment/worker worker="$BASE/worker:$IMAGE_TAG"
          kubectl -n "$NS" set image deployment/worker-beat worker-beat="$BASE/worker:$IMAGE_TAG"
          kubectl -n "$NS" set image deployment/flower flower="$BASE/worker:$IMAGE_TAG"

      - name: Safe rollout checks
        run: |
          NS="${{ steps.ns.outputs.value }}"
          kubectl -n "$NS" rollout status deployment/frontend --timeout=180s
          kubectl -n "$NS" rollout status deployment/backend --timeout=180s
          kubectl -n "$NS" rollout status deployment/worker --timeout=180s
          kubectl -n "$NS" rollout status deployment/worker-beat --timeout=180s
          kubectl -n "$NS" rollout status deployment/flower --timeout=180s
