name: Dependency maintenance

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    name: Dependency security scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: JS high-severity audit
        run: pnpm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Python audit (backend)
        run: |
          cd apps/backend
          uv export --locked --format requirements.txt --all-extras --no-emit-project -o /tmp/backend-req.txt
          uvx --from pip-audit pip-audit -r /tmp/backend-req.txt

      - name: Python audit (worker)
        run: |
          cd apps/worker
          uv export --locked --format requirements.txt --all-extras --no-emit-project -o /tmp/worker-req.txt
          uvx --from pip-audit pip-audit -r /tmp/worker-req.txt
