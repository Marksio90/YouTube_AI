version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "security"
    open-pull-requests-limit: 10

  - package-ecosystem: "pip"
    directory: "/apps/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:10"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "security"
    open-pull-requests-limit: 10

  - package-ecosystem: "pip"
    directory: "/apps/worker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:20"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "security"
    open-pull-requests-limit: 10
