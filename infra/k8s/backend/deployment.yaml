apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: api
  annotations:
    # Force rolling update on secret/configmap change by bumping this value
    configmap-hash: "placeholder"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime deploy
  template:
    metadata:
      annotations:
        co.elastic.logs/enabled: "true"
        co.elastic.logs/json.keys_under_root: "true"
        co.elastic.logs/json.add_error_key: "true"
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: ai-media-os
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: ai-media-os-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      # Wait for postgres + redis before starting
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "waiting for postgres..."; sleep 2;
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."; sleep 2;
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: backend
          # Update image tag for each deployment
          image: your-registry.io/ai-media-os/backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            # ── Non-sensitive config ─────────────────────────────────────
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: APP_ENV
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: APP_VERSION
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: LOG_LEVEL
            - name: JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: JWT_ALGORITHM
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: REFRESH_TOKEN_EXPIRE_DAYS
            - name: S3_BUCKET_MEDIA
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: S3_BUCKET_MEDIA
            - name: S3_BUCKET_EXPORTS
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: S3_BUCKET_EXPORTS
            - name: S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: S3_REGION
            - name: YOUTUBE_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: YOUTUBE_REDIRECT_URI
            - name: ANALYTICS_RETENTION_DAYS
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: ANALYTICS_RETENTION_DAYS
            # ── Secrets ───────────────────────────────────────────────────
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: CELERY_RESULT_BACKEND
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: SECRET_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: ANTHROPIC_API_KEY
            - name: YOUTUBE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: YOUTUBE_CLIENT_ID
            - name: YOUTUBE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: YOUTUBE_CLIENT_SECRET
            - name: S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: S3_ENDPOINT_URL
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: S3_SECRET_ACCESS_KEY
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: SENTRY_DSN
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            # Allow up to 60s (12 * 5s) for initial startup
            failureThreshold: 12
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: backend
