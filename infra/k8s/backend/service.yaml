apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
---
# ServiceAccount for backend pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-media-os-backend
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: ai-media-os
automountServiceAccountToken: false
