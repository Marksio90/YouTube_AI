apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 2
  maxReplicas: 30
  metrics:
    # CPU keeps worker responsive for heavy tasks.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75

    # Queue-pressure scaling from Prometheus adapter external metric.
    - type: External
      external:
        metric:
          name: celery_queue_messages
        target:
          type: AverageValue
          averageValue: "30"

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 8
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 600
      selectPolicy: Min
      policies:
        - type: Percent
          value: 15
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
