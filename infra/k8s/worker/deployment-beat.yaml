apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-beat
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: worker-beat
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: scheduler
spec:
  # MUST be 1 — duplicate beat processes send duplicate periodic tasks
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: worker-beat
      app.kubernetes.io/component: scheduler
  strategy:
    # Recreate: ensures old beat stops before new one starts
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker-beat
        app.kubernetes.io/part-of: ai-media-os
        app.kubernetes.io/component: scheduler
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: ai-media-os-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."; sleep 2;
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: worker-beat
          image: your-registry.io/ai-media-os/worker:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - worker.celery_app
            - beat
            - --loglevel=info
            - --scheduler
            - redbeat.RedBeatScheduler
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: APP_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: LOG_LEVEL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: CELERY_RESULT_BACKEND
            - name: REDBEAT_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: REDBEAT_REDIS_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: SECRET_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          # Beat has no HTTP endpoint — check process is alive
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f 'celery.*beat' > /dev/null"
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
