apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      # Allow 1 unavailable — tasks are re-queued on SIGTERM (acks_late=True)
      maxUnavailable: 1
  template:
    metadata:
      annotations:
        co.elastic.logs/enabled: "true"
        co.elastic.logs/json.keys_under_root: "true"
        co.elastic.logs/json.add_error_key: "true"
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/part-of: ai-media-os
        app.kubernetes.io/component: worker
    spec:
      # Long grace period: active Celery tasks must finish before pod dies
      terminationGracePeriodSeconds: 120
      serviceAccountName: ai-media-os-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."; sleep 2;
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "waiting for postgres..."; sleep 2;
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: worker
          image: your-registry.io/ai-media-os/worker:latest
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 9108
              protocol: TCP
          command:
            - celery
            - -A
            - worker.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
            - -Q
            - default,high,ai,media,analytics,pipeline
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: APP_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: LOG_LEVEL
            - name: S3_BUCKET_MEDIA
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: S3_BUCKET_MEDIA
            - name: S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: S3_REGION
            - name: LLM_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: LLM_PROVIDER
            - name: LLM_DEFAULT_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: LLM_DEFAULT_MODEL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: CELERY_RESULT_BACKEND
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: SECRET_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: ANTHROPIC_API_KEY
            - name: YOUTUBE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: YOUTUBE_CLIENT_ID
            - name: YOUTUBE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: YOUTUBE_CLIENT_SECRET
            - name: S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: S3_ENDPOINT_URL
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: S3_SECRET_ACCESS_KEY
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: SENTRY_DSN
                  optional: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          # Celery workers don't serve HTTP — use exec probe
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - celery -A worker.celery_app inspect ping -d celery@$HOSTNAME --timeout=10
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 15
            failureThreshold: 3
          # Workers are ready once the broker connection is established
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - celery -A worker.celery_app inspect ping -d celery@$HOSTNAME --timeout=10
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: worker
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-media-os-worker
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: ai-media-os
automountServiceAccountToken: false
