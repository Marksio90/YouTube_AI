apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: flower
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: flower
      app.kubernetes.io/component: monitoring
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flower
        app.kubernetes.io/part-of: ai-media-os
        app.kubernetes.io/component: monitoring
    spec:
      terminationGracePeriodSeconds: 15
      serviceAccountName: ai-media-os-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."; sleep 2;
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: flower
          image: your-registry.io/ai-media-os/worker:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - worker.celery_app
            - flower
            - --port=5555
            - --url_prefix=flower
            - --persistent=True
            - --db=/tmp/flower.db
          ports:
            - name: http
              containerPort: 5555
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: APP_ENV
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: CELERY_RESULT_BACKEND
            - name: FLOWER_BASIC_AUTH
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: FLOWER_BASIC_AUTH
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /flower/healthcheck
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /flower/healthcheck
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
