apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  clusterIP: None  # Headless — stable DNS: redis-0.redis
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
