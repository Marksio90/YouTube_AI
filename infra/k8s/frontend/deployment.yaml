apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: ai-media-os
        app.kubernetes.io/component: frontend
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: ai-media-os-frontend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: your-registry.io/ai-media-os/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            # Public env vars — safe in configmap
            - name: NEXT_PUBLIC_APP_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: NEXT_PUBLIC_APP_URL
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXT_PUBLIC_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: NEXT_PUBLIC_WS_URL
            - name: NEXTAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-media-os-config
                  key: NEXTAUTH_URL
            # Secrets
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-media-os-secrets
                  key: NEXTAUTH_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            # Up to 75s (15 * 5s) for Next.js cold start
            failureThreshold: 15
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: frontend
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-media-os-frontend
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: ai-media-os
automountServiceAccountToken: false
