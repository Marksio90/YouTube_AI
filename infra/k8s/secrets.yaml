# =============================================================================
# AI Media OS — Kubernetes Secrets Template
#
# DO NOT commit real values to git. This file contains placeholder values.
#
# To populate secrets, either:
#   1. Use `kubectl create secret generic ai-media-os-secrets -n ai-media-os \
#         --from-literal=POSTGRES_USER=media_os \
#         --from-literal=POSTGRES_PASSWORD=<strong-password> ...`
#
#   2. Use Sealed Secrets / External Secrets Operator / Vault in production.
#
#   3. Replace <base64-encoded-value> below:
#      echo -n 'your-value' | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ai-media-os-secrets
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: ai-media-os
    app.kubernetes.io/part-of: ai-media-os
type: Opaque
data:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  # echo -n 'media_os' | base64
  POSTGRES_USER: bWVkaWFfb3M=
  # echo -n 'CHANGE-ME-strong-db-password' | base64
  POSTGRES_PASSWORD: <base64-encoded-postgres-password>
  # echo -n 'postgresql+asyncpg://media_os:CHANGE-ME-strong-db-password@postgres:5432/ai_media_os' | base64
  DATABASE_URL: <base64-encoded-full-database-url>
  # Sync (non-async) URL for Alembic migrations
  DATABASE_URL_SYNC: <base64-encoded-sync-database-url>

  # ── Redis ─────────────────────────────────────────────────────────────────
  # echo -n 'CHANGE-ME-redis-password' | base64
  REDIS_PASSWORD: <base64-encoded-redis-password>
  # echo -n 'redis://:CHANGE-ME-redis-password@redis:6379/0' | base64
  REDIS_URL: <base64-encoded-redis-url>
  # echo -n 'redis://:CHANGE-ME-redis-password@redis:6379/1' | base64
  CELERY_BROKER_URL: <base64-encoded-celery-broker-url>
  # echo -n 'redis://:CHANGE-ME-redis-password@redis:6379/2' | base64
  CELERY_RESULT_BACKEND: <base64-encoded-celery-result-backend-url>
  # echo -n 'redis://:CHANGE-ME-redis-password@redis:6379/3' | base64
  REDBEAT_REDIS_URL: <base64-encoded-redbeat-redis-url>

  # ── Application Auth ──────────────────────────────────────────────────────
  # echo -n $(openssl rand -hex 32) | base64
  SECRET_KEY: <base64-encoded-secret-key>
  # ── AI / LLM ──────────────────────────────────────────────────────────────
  OPENAI_API_KEY: <base64-encoded-openai-api-key>
  ANTHROPIC_API_KEY: <base64-encoded-anthropic-api-key>

  # ── YouTube OAuth ─────────────────────────────────────────────────────────
  YOUTUBE_CLIENT_ID: <base64-encoded-youtube-client-id>
  YOUTUBE_CLIENT_SECRET: <base64-encoded-youtube-client-secret>

  # ── S3 / Object Storage ───────────────────────────────────────────────────
  S3_ENDPOINT_URL: <base64-encoded-s3-endpoint-url>
  S3_ACCESS_KEY_ID: <base64-encoded-s3-access-key-id>
  S3_SECRET_ACCESS_KEY: <base64-encoded-s3-secret-access-key>

  # ── Monitoring ────────────────────────────────────────────────────────────
  # echo -n 'https://xxx@sentry.io/yyy' | base64
  SENTRY_DSN: <base64-encoded-sentry-dsn>

  # ── Flower (Celery monitoring) ────────────────────────────────────────────
  # echo -n 'admin:CHANGE-ME-flower-password' | base64
  FLOWER_BASIC_AUTH: <base64-encoded-flower-basic-auth>
