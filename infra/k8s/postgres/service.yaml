apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  clusterIP: None  # Headless — StatefulSet pods get stable DNS: postgres-0.postgres
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
