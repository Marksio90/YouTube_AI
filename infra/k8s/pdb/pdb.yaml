apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: ai-media-os
spec:
  # At least 1 backend pod available during node drain / rollout
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/component: api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: ai-media-os
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/component: frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker-pdb
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: ai-media-os
spec:
  # At least 1 worker pod — tasks don't pile up during disruptions
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
      app.kubernetes.io/component: worker
---
