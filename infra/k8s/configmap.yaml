apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-media-os-config
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: ai-media-os
    app.kubernetes.io/part-of: ai-media-os
data:
  # ── Application ──────────────────────────────────────────────────────────
  APP_ENV: "production"
  APP_VERSION: "0.1.0"
  LOG_LEVEL: "INFO"

  # ── PostgreSQL (non-sensitive) ───────────────────────────────────────────
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "ai_media_os"

  # ── Redis (non-sensitive) ────────────────────────────────────────────────
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # ── LLM ──────────────────────────────────────────────────────────────────
  LLM_PROVIDER: "openai"
  LLM_DEFAULT_MODEL: "gpt-4o-mini"

  # ── Auth ──────────────────────────────────────────────────────────────────
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "30"

  # ── Storage ───────────────────────────────────────────────────────────────
  S3_BUCKET_MEDIA: "ai-media-os-media"
  S3_BUCKET_EXPORTS: "ai-media-os-exports"
  S3_REGION: "us-east-1"

  # ── Analytics ────────────────────────────────────────────────────────────
  ANALYTICS_RETENTION_DAYS: "730"

  # ── Frontend / public ────────────────────────────────────────────────────
  # Update these to match your actual domain
  NEXT_PUBLIC_APP_URL: "https://app.yourdomain.com"
  NEXT_PUBLIC_API_URL: "https://app.yourdomain.com/api/v1"
  NEXT_PUBLIC_WS_URL: "wss://app.yourdomain.com/ws"
  NEXTAUTH_URL: "https://app.yourdomain.com"

  # ── YouTube redirect ──────────────────────────────────────────────────────
  YOUTUBE_REDIRECT_URI: "https://app.yourdomain.com/api/v1/auth/youtube/callback"

  # ── Celery worker config ──────────────────────────────────────────────────
  CELERY_WORKER_CONCURRENCY: "4"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: database
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pg_trgm";
    CREATE EXTENSION IF NOT EXISTS "btree_gin";
