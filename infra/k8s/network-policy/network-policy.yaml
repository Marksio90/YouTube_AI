# =============================================================================
# Network Policies — default-deny, then allow explicit paths
# Enforces least-privilege pod-to-pod communication.
# =============================================================================

# ── Default deny all ingress + egress in namespace ───────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ai-media-os
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# ── Allow all pods: DNS egress (CoreDNS on kube-system:53) ───────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: ai-media-os
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ── Postgres: accept connections from backend + worker only ──────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress
  namespace: ai-media-os
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: database
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: worker
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: scheduler
      ports:
        - port: 5432
---
# ── Redis: accept from backend + workers + flower ────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-ingress
  namespace: ai-media-os
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: cache
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: worker
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: scheduler
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: monitoring
      ports:
        - port: 6379
---
# ── Backend: accept from ingress controller + frontend ───────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-ingress
  namespace: ai-media-os
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        # nginx-ingress-controller lives in ingress-nginx namespace
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: frontend
      ports:
        - port: 8000
  egress:
    # postgres
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: database
      ports:
        - port: 5432
    # redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: cache
      ports:
        - port: 6379
    # external HTTPS (OpenAI, Anthropic, YouTube, S3, Sentry)
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
---
# ── Frontend: accept from ingress controller ─────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-ingress
  namespace: ai-media-os
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000
  egress:
    # Backend API calls (server-side Next.js → backend)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api
      ports:
        - port: 8000
    # External HTTPS (fonts, CDN, etc.)
    - ports:
        - port: 443
          protocol: TCP
---
# ── Worker: egress to postgres + redis + external ────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: worker-egress
  namespace: ai-media-os
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: worker
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: database
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: cache
      ports:
        - port: 6379
    # External: OpenAI, Anthropic, YouTube API, S3, Sentry
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
---
# ── Beat scheduler: egress to redis only ─────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: scheduler-egress
  namespace: ai-media-os
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: scheduler
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: cache
      ports:
        - port: 6379
---
# ── Flower: ingress from ingress-controller, egress to redis ─────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flower-policy
  namespace: ai-media-os
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: flower
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 5555
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: cache
      ports:
        - port: 6379

---
# ── Monitoring scrapes: allow Prometheus ingress to metrics endpoints ───────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-scrape-ingress
  namespace: ai-media-os
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: ["backend", "worker", "redis-exporter", "postgres-exporter"]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 8000
        - port: 9108
        - port: 9121
        - port: 9187
---
# ── Monitoring egress: Prometheus -> services, Grafana -> Prometheus ─────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-egress
  namespace: ai-media-os
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: ["prometheus", "grafana"]
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: backend
      ports:
        - port: 8000
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: worker
      ports:
        - port: 9108
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis-exporter
      ports:
        - port: 9121
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres-exporter
      ports:
        - port: 9187
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 9090

---
# ── Logging ingest: Logstash accepts from Filebeat ───────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: logstash-ingress
  namespace: ai-media-os
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: logstash
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: filebeat
      ports:
        - port: 5044
---
# ── Logging egress paths between ELK components ──────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: logging-egress
  namespace: ai-media-os
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: ["filebeat", "logstash", "kibana"]
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: logstash
      ports:
        - port: 5044
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: elasticsearch
      ports:
        - port: 9200
    - ports:
        - port: 443
          protocol: TCP
---
# ── Elasticsearch ingress from Logstash + Kibana ─────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: elasticsearch-ingress
  namespace: ai-media-os
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: ["logstash", "kibana"]
      ports:
        - port: 9200
