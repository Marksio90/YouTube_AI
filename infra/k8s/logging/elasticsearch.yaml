apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch
        app.kubernetes.io/part-of: ai-media-os
        app.kubernetes.io/component: logging
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: -Xms1g -Xmx1g
          ports:
            - name: http
              containerPort: 9200
          resources:
            requests:
              cpu: 300m
              memory: 2Gi
            limits:
              cpu: 1000m
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: ai-media-os
spec:
  selector:
    app.kubernetes.io/name: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: http
