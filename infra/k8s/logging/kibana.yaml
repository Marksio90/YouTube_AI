apiVersion: v1
kind: ConfigMap
metadata:
  name: kibana-dashboard
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: kibana
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: logging

data:
  ai-media-os-logs.ndjson: |
    {"attributes":{"description":"Operational dashboard for backend/worker/API/workflow logs","hits":0,"kibanaSavedObjectMeta":{"searchSourceJSON":"{\"query\":{\"query\":\"\",\"language\":\"kuery\"},\"filter\":[]}"},"optionsJSON":"{\"useMargins\":true,\"syncColors\":false,\"syncCursor\":true,\"syncTooltips\":false}","panelsJSON":"[]","timeRestore":false,"title":"AI Media OS Logs","version":1},"coreMigrationVersion":"8.15.0","id":"ai-media-os-logs-dashboard","migrationVersion":{"dashboard":"8.9.0"},"references":[],"type":"dashboard","updated_at":"2026-04-25T00:00:00.000Z","version":"WzEsMV0="}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: kibana
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kibana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kibana
        app.kubernetes.io/part-of: ai-media-os
        app.kubernetes.io/component: logging
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.15.0
          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch:9200
          ports:
            - name: http
              containerPort: 5601
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: ai-media-os
spec:
  selector:
    app.kubernetes.io/name: kibana
  ports:
    - name: http
      port: 5601
      targetPort: http
