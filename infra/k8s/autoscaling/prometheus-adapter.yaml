apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-adapter
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: prometheus-adapter
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: autoscaling
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-adapter
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/stats", "pods", "services", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["custom.metrics.k8s.io", "external.metrics.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-adapter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-adapter
subjects:
  - kind: ServiceAccount
    name: prometheus-adapter
    namespace: ai-media-os
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-adapter-auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: prometheus-adapter
    namespace: ai-media-os
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-adapter-auth-reader
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - kind: ServiceAccount
    name: prometheus-adapter
    namespace: ai-media-os
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-adapter-config
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: prometheus-adapter
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: autoscaling
data:
  config.yaml: |
    rules:
      default: false
      custom:
        - seriesQuery: 'api_requests_total{pod!="",namespace!=""}'
          resources:
            overrides:
              namespace:
                resource: namespace
              pod:
                resource: pod
          name:
            matches: "^api_requests_total$"
            as: "api_requests_per_second"
          metricsQuery: |
            sum(rate(api_requests_total{<<.LabelMatchers>>}[2m])) by (<<.GroupBy>>)
      external:
        - seriesQuery: 'celery_queue_size{queue!=""}'
          name:
            matches: "^celery_queue_size$"
            as: "celery_queue_messages"
          metricsQuery: |
            sum(celery_queue_size{queue=~"default|high|ai|media|analytics"})
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-adapter
  namespace: ai-media-os
  labels:
    app.kubernetes.io/name: prometheus-adapter
    app.kubernetes.io/part-of: ai-media-os
    app.kubernetes.io/component: autoscaling
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus-adapter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus-adapter
        app.kubernetes.io/part-of: ai-media-os
        app.kubernetes.io/component: autoscaling
    spec:
      serviceAccountName: prometheus-adapter
      containers:
        - name: prometheus-adapter
          image: registry.k8s.io/prometheus-adapter/prometheus-adapter:v0.11.2
          args:
            - /adapter
            - --secure-port=6443
            - --prometheus-url=http://prometheus:9090
            - --metrics-relist-interval=1m
            - --config=/etc/adapter/config.yaml
          ports:
            - containerPort: 6443
              name: https
          volumeMounts:
            - name: config
              mountPath: /etc/adapter
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-adapter-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-adapter
  namespace: ai-media-os
spec:
  selector:
    app.kubernetes.io/name: prometheus-adapter
  ports:
    - name: https
      port: 443
      targetPort: https
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1beta1.custom.metrics.k8s.io
spec:
  service:
    name: prometheus-adapter
    namespace: ai-media-os
  group: custom.metrics.k8s.io
  version: v1beta1
  insecureSkipTLSVerify: true
  groupPriorityMinimum: 100
  versionPriority: 100
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1beta1.external.metrics.k8s.io
spec:
  service:
    name: prometheus-adapter
    namespace: ai-media-os
  group: external.metrics.k8s.io
  version: v1beta1
  insecureSkipTLSVerify: true
  groupPriorityMinimum: 100
  versionPriority: 100
