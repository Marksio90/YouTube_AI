# =============================================================================
# docker-compose.override.yml — LOCAL DEV (auto-applied by docker compose up)
#
# One command to start everything in dev mode:
#   docker compose up
#
# For production (skip this file):
#   docker compose -f docker-compose.yml up
# =============================================================================

services:
  # ── Infrastructure: expose ports locally ─────────────────────────────────────
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  # ── Backend: hot reload ───────────────────────────────────────────────────────
  backend:
    build:
      target: development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app
    volumes:
      - ./apps/backend:/app
    environment:
      APP_ENV: development
      LOG_LEVEL: DEBUG

  # ── Worker: hot reload via watchmedo ─────────────────────────────────────────
  worker:
    build:
      target: development
    command: >
      watchmedo auto-restart
        --directory=./worker
        --pattern=*.py
        --recursive
        --
        celery -A worker.celery_app worker
          --loglevel=debug --concurrency=2
          -Q default,high,ai,media,analytics,pipeline
    volumes:
      - ./apps/worker:/app

  worker_beat:
    build:
      target: development
    volumes:
      - ./apps/worker:/app

  # ── Frontend: Next.js dev server with hot reload ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: development
    command: pnpm dev --hostname 0.0.0.0
    volumes:
      # Mount source for hot reload; keep node_modules from image
      - ./apps/frontend/src:/repo/apps/frontend/src
      - ./apps/frontend/public:/repo/apps/frontend/public
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    healthcheck:
      disable: true

  # ── Nginx: not needed locally (direct port access) ────────────────────────────
  nginx:
    profiles:
      - nginx
